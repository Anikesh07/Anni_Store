<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Anni Store</title>
  <link rel="stylesheet" href="/login/css/style.css">
</head>
<body>

<!-- =========================
     LOGIN SKELETON LOADER
========================= -->
<div id="loginSkeleton" class="login-skeleton">
  <div class="skeleton-card">
    <div class="sk-logo"></div>
    <div class="sk-subtitle"></div>
    <div class="sk-input"></div>
    <div class="sk-button"></div>
  </div>
</div>

<!-- =========================
     LOGIN CONTAINER
========================= -->
<div id="loginContainer" class="auth-container hidden">

  <div class="auth-card">

    <h1 class="brand">Anni Store</h1>
    <p class="subtitle">Admin & Employee Login</p>

    <form id="authForm">

      <!-- Email -->
      <div class="input-group">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <!-- Password (Login Mode) -->
      <div class="input-group password-wrapper" id="passwordGroup">
        <input type="password" id="password" placeholder="Password">
        <span class="toggle-password" data-target="password">👁</span>
      </div>

      <!-- OTP (Activation Mode) -->
      <div class="input-group hidden" id="otpGroup">
        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
      </div>

      <!-- New Password -->
      <div class="input-group hidden password-wrapper" id="newPasswordGroup">
        <input type="password" id="newPassword" placeholder="Set New Password">
        <span class="toggle-password" data-target="newPassword">👁</span>
      </div>

      <!-- Confirm Password -->
      <div class="input-group hidden password-wrapper" id="confirmPasswordGroup">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="toggle-password" data-target="confirmPassword">👁</span>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn" class="auth-btn">
        <span class="btn-text">LOGIN</span>
        <span class="btn-loader hidden"></span>
      </button>

    </form>

    <!-- Toggle Activate -->
    <p class="toggle-text" id="toggleText">
      <span id="toggleBtn" class="toggle-btn">Activate Account</span>
    </p>

    <!-- Error Message -->
    <p id="errorMsg" class="error"></p>

  </div>
</div>

<!-- =========================
     FULL SCREEN LOADER
========================= -->
<div id="authLoaderOverlay" class="auth-loader-overlay hidden">
  <div class="anni-loader">
    <div class="anni-grid">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="anni-loading-text">Entering Dashboard</p>
  </div>
</div>

<script src="/login/js/login.js" defer></script>

</body>
</html>
