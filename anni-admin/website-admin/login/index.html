<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Anni Store</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/login/css/style.css">
</head>
<body>

<!-- =========================
     LOGIN SKELETON LOADER
========================= -->
<div id="loginSkeleton" class="login-skeleton">
  <div class="skeleton-card">
    <div class="sk-logo"></div>
    <div class="sk-subtitle"></div>
    <div class="sk-input"></div>
    <div class="sk-input"></div>
    <div class="sk-button"></div>
    <div class="sk-text"></div>
  </div>
</div>


<!-- =========================
     LOGIN CONTAINER
========================= -->
<div id="loginContainer" class="auth-container hidden">

  <div class="auth-card">

    <h1 class="brand">Anni Store</h1>
    <p class="subtitle" id="formTitle">Admin Login</p>

    <form id="authForm">

      <!-- Name (Signup Only) -->
      <div class="input-group hidden" id="nameGroup">
        <input type="text" id="name" placeholder="Full Name">
      </div>

      <!-- Email -->
      <div class="input-group">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <!-- Password -->
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn" class="auth-btn">
        <span class="btn-text">LOGIN</span>
        <span class="btn-loader hidden"></span>
      </button>

    </form>

    <!-- Error Message -->
    <p id="errorMsg" class="error"></p>

    <!-- Toggle -->
    <p class="toggle-text">
      <span id="toggleText">Don't have an account?</span>
      <span id="toggleBtn" class="toggle-btn">Sign Up</span>
    </p>

  </div>
</div>


<!-- =========================
     FULL SCREEN LOADER
========================= -->
<div id="authLoaderOverlay" class="auth-loader-overlay hidden">
  <div class="anni-loader">
    <div class="anni-grid">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="anni-loading-text">Entering Dashboard</p>
  </div>
</div>


<!-- JS (IMPORTANT: use defer) -->
<script src="/login/js/login.js" defer></script>

</body>
</html>
